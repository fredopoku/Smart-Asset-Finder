<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Smart Asset Finder Icon">
  <defs>
    <linearGradient id="safIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass circle -->
  <circle cx="20" cy="20" r="14" fill="none" stroke="url(#safIconGrad)" stroke-width="4"/>
  <!-- Location pin inside -->
  <circle cx="20" cy="17" r="5.5" fill="url(#safIconGrad)"/>
  <path d="M20 22.5 L20 27" stroke="url(#safIconGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="30.5" y1="30.5" x2="42" y2="42" stroke="url(#safIconGrad)" stroke-width="5" stroke-linecap="round"/>
</svg>
