<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52" role="img" aria-label="Smart Asset Finder">
  <defs>
    <linearGradient id="safGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass body -->
  <circle cx="22" cy="21" r="15" fill="none" stroke="url(#safGrad)" stroke-width="3.5"/>
  <!-- Location pin inside lens -->
  <circle cx="22" cy="18" r="5.5" fill="url(#safGrad)"/>
  <path d="M22 23.5 L22 29" stroke="url(#safGrad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="33" y1="32" x2="44" y2="43" stroke="url(#safGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Brand name -->
  <text x="56" y="22" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="800" fill="#1a56db" letter-spacing=".3">Smart Asset</text>
  <text x="56" y="40" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="600" fill="#0ea5e9" letter-spacing="3.5">FINDER</text>
</svg>
